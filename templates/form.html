<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Inspection Report | Class A Fix</title>

<style>
:root{
  --brand:#0077B6;
  --light:#F5F7FA;
  --border:#D0D7DE;
  --radius:12px;
}

body{
  margin:0;
  font-family: Helvetica, Arial, sans-serif;
  background:var(--light);
  color:#222;
}

.page{
  max-width:900px;
  margin:40px auto;
}

.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:20px;
}

h1{
  margin:0 0 20px 0;
  color:var(--brand);
}

.section-title{
  font-size:15px;
  font-weight:700;
  margin-bottom:12px;
  color:var(--brand);
}

label{
  font-weight:700;
  display:block;
  margin-top:12px;
}

input[type="text"],
input[type="date"],
select,
textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  font-size:14px;
  border:1px solid var(--border);
  border-radius:8px;
  box-sizing:border-box;
  background:#fff;
}

textarea{
  resize:vertical;
}

.radio-group{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  margin-top:10px;
}

.radio-group label{
  font-weight:400;
  margin-top:0;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.upload{
  margin-top:10px;
}

button{
  background:var(--brand);
  color:#fff;
  font-size:16px;
  font-weight:700;
  padding:14px 26px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

@media (max-width: 700px){
  .page{margin:16px;}
  .grid{grid-template-columns:1fr;}
  .radio-group{flex-direction:column;gap:10px;}
}
</style>
</head>

<body>
<div class="page">

<form action="/generate" method="post" enctype="multipart/form-data">

  <div class="card">
    <h1>Inspection Report</h1>

    <div class="grid">
      <div>
        <label>Property address</label>
        <input type="text" name="property_address" required>
      </div>
      <div>
        <label>Inspection date</label>
        <input type="date" name="inspection_date" required>
      </div>
      <div>
        <label>Real estate agency</label>
        <input type="text" name="agency">
      </div>
      <div>
        <label>Property manager</label>
        <input type="text" name="property_manager">
      </div>
      <div>
        <label>Inspector name</label>
        <input type="text" name="inspector_name" required>
      </div>
      <div>
        <label>Tenant status</label>
        <select name="tenant_status">
          <option value="Tenant present">Tenant present</option>
          <option value="Tenant absent">Tenant absent</option>
          <option value="Vacant property">Vacant property</option>
        </select>
      </div>
    </div>

    <label>Overall summary</label>
    <textarea name="overall_summary" rows="4" placeholder="High level inspection summary"></textarea>
  </div>

  {% for section in sections %}
  <div class="card">
    <div class="section-title">{{ section.name }}</div>

    <label>Status</label>
    <div class="radio-group">
      <label><input type="radio" name="{{ section.key }}_status" value="Good" required> Good</label>
      <label><input type="radio" name="{{ section.key }}_status" value="Monitor"> Monitor</label>
      <label><input type="radio" name="{{ section.key }}_status" value="Needs attention"> Needs attention</label>
      <label><input type="radio" name="{{ section.key }}_status" value="Not inspected"> Not inspected</label>
    </div>

    <label>Condition summary</label>
    <input type="text" name="{{ section.key }}_condition" placeholder="Short summary for this section">

    <label>Notes</label>
    <textarea name="{{ section.key }}_notes" rows="3" placeholder="Detailed observations, defects, recommendations"></textarea>

    <label>Photos</label>
    <input class="upload" type="file" name="{{ section.key }}_photos" multiple accept="image/*" capture="environment">
  </div>
  {% endfor %}

  <div class="card">
    <button type="submit">Generate PDF</button>
  </div>

</form>

</div>
</body>
</html>
